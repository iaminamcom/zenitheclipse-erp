# Use this only if you loaded ZenithEclipseERP_Docker_Image_amd64.tar on the Dokploy server.
services:
  zenith-erp:
    image: zenitheclipse/erp-ultimate:1.0.0-amd64
    pull_policy: never
    restart: unless-stopped
    ports:
      - "8080"
    environment:
      ZENITH_ERP_ADDR: "0.0.0.0:8080"
      ZENITH_ERP_BROWSER: "0"
      ZENITH_ERP_DATA: "/data"
      ZENITH_ERP_COOKIE_SECURE: "1"
      ZENITH_ERP_ADMIN_PASSWORD: "CHANGE_ME_BEFORE_FIRST_DEPLOY"
    volumes:
      - zenith_erp_data:/data

volumes:
  zenith_erp_data:
